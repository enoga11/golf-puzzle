<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golf Puzzle</title>
    <style>
        :root {
            --bg: #f5f1e8;
            --card: #fffaf0;
            --gold: #b9931a;
            --green: #234b2a;
            --text: #1f1f1f;
            --muted: #666;
            --success-text: #1b5e20;
            --error-text: #8a1c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, "Times New Roman", serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 24px;
        }

        .wrap {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0 0 8px;
            color: var(--green);
            font-size: 2rem;
        }

        .header p {
            margin: 0;
            color: var(--muted);
        }

        .card {
            background: var(--card);
            border: 3px solid var(--gold);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .viewer {
            width: 100%;
            height: 75vh;
            border: 2px solid #d8c98f;
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }

        .viewer iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .answer-section {
            margin-top: 20px;
            display: grid;
            gap: 12px;
        }

        h2 {
            margin: 0;
            color: var(--green);
        }

        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1 1 260px;
            min-width: 240px;
            padding: 12px 14px;
            font-size: 1rem;
            border: 2px solid #c9b978;
            border-radius: 10px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(185, 147, 26, 0.15);
        }

        button {
            padding: 12px 18px;
            font-size: 1rem;
            font-weight: bold;
            border: 0;
            border-radius: 10px;
            background: var(--green);
            color: white;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.95;
        }

        .result {
            min-height: 24px;
            font-weight: bold;
        }

        .success {
            color: var(--success-text);
        }

        .error {
            color: var(--error-text);
        }

        .footer-note {
            font-size: 0.95rem;
            color: var(--muted);
        }

        @media (max-width: 700px) {
            body {
                padding: 16px;
            }

            .viewer {
                height: 62vh;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="header">
            <h1>Golf Puzzle</h1>
            <p>Solve the puzzle below, then enter your final answer.</p>
        </div>

        <div class="card">
            <div class="viewer">
                <iframe src="golf-puzzle.pdf" title="Golf Puzzle PDF"></iframe>
            </div>

            <div class="answer-section">
                <h2>Check your answer</h2>
                <div class="input-row">
                    <input id="answer" type="text" placeholder="Enter final answer" autocomplete="off" />
                    <button id="checkButton" type="button">Submit</button>
                </div>
                <div id="result" class="result"></div>
                <div class="footer-note">
                    Enter your final answer above to see if you've solved it.
                </div>
            </div>
        </div>
    </div>

    <script>
        async function checkAnswer() {
            const input = document.getElementById("answer");
            const result = document.getElementById("result");
            const guess = input.value;

            result.textContent = "Checking...";
            result.className = "result";

            try {
                const response = await fetch("/api/check-answer", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ answer: guess })
                });

                const data = await response.json();

                if (data.correct) {
                    result.textContent = "Correct! Nicely played.";
                    result.className = "result success";
                } else {
                    result.textContent = "Not quite. Try again.";
                    result.className = "result error";
                }
            } catch (error) {
                result.textContent = "Something went wrong. Please try again.";
                result.className = "result error";
            }
        }

        document.getElementById("checkButton").addEventListener("click", checkAnswer);
        document.getElementById("answer").addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });
    </script>
</body>

</html>
